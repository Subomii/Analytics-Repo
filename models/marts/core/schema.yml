version: 2

models:
  - name: fct_olist_orders
    columns:
      - name: order_id
        tests:
          - unique
          - not_null
      - name: customer_id
        tests:
          - not_null
      - name: order_status
        tests:
          - not_null
      - name: total_payment_value
        tests:
          - not_null:
              config:
                severity: warn

  - name: dim_olist_customers
    columns:
      - name: customer_id
        tests:
          - unique
          - not_null
      - name: customer_unique_id
        tests:
          - not_null