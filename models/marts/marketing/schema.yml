version: 2

models:
  - name: fct_seller_performance
    description: One row per seller with aggregated revenue review and delivery metrics
    columns:
      - name: seller_id
        description: Unique identifier for each seller
        tests:
          - unique
          - not_null
      - name: seller_city
        description: City where the seller is located
      - name: seller_state
        description: Brazilian state where the seller is located
      - name: total_orders
        description: Total number of orders fulfilled by the seller
        tests:
          - not_null:
              config:
                severity: warn
      - name: total_revenue
        description: Total revenue generated by the seller in Brazilian Reais
        tests:
          - not_null:
              config:
                severity: warn
      - name: avg_review_score
        description: Average customer review score across all seller orders
      - name: avg_delivery_days
        description: Average number of days to deliver orders
      - name: unique_products_sold
        description: Number of unique products sold by the seller

  - name: dim_products
    description: One row per product with category translations and sales metrics
    columns:
      - name: product_id
        description: Unique identifier for each product
        tests:
          - unique
          - not_null
      - name: product_category_name
        description: Product category name in Portuguese
        tests:
          - not_null:
              config:
                severity: warn
      - name: product_category_name_english
        description: Product category name translated to English
      - name: product_weight_g
        description: Product weight in grams
      - name: total_orders
        description: Total number of orders containing this product
      - name: total_revenue
        description: Total revenue generated by this product in Brazilian Reais
      - name: avg_price
        description: Average selling price of the product in Brazilian Reais
      - name: total_freight_value
        description: Total freight costs associated with this product